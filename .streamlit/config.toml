[theme]
# 1. สีหลัก (ปุ่มกด, แถบ Progress Bar, ไฮไลท์) 
# ใช้โทนสีส้มอมแดง ให้ความรู้สึกกระตุ้นความอยากอาหารและเข้ากับแบนเนอร์
primaryColor = "#2EBA9B"

# 2. สีพื้นหลังหลักของหน้าแอป (Main Area)
# ใช้สีขาวอมครีมนิดๆ เพื่อไม่ให้สว่างจ้าจนเกินไป และทำให้รูปแบนเนอร์/แผนที่ดูโดดเด่นขึ้น
backgroundColor = "#F9FBFB"

# 3. สีพื้นหลังของแถบเมนูด้านข้าง (Sidebar)
# ใช้โทนสีไข่ไก่/พีชอ่อนๆ เพื่อแบ่งสัดส่วนจากหน้าจอหลักให้ดูนุ่มนวล
secondaryBackgroundColor = "#E8F5F2"

# 4. สีของตัวอักษรทั้งหมด
# ใช้สีเทาเข้มแทนสีดำสนิท เพื่อให้อ่านง่ายและดูพรีเมียมขึ้น
textColor = "#1E293B"

# 5. รูปแบบฟอนต์
font = "sans serif"